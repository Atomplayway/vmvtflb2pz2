<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>123</title>
</head>
<body>
  
  <div id="profile"></div>

  <script>
    fetch('data.json')
      .then(response => response.text())
      .then(text => {
        const data = JSON.parse(text);
        const profile = document.getElementById('profile');

        const nameElem = document.createElement('p');
        nameElem.textContent = `Ім'я: ${data.name}`;

        const ageElem = document.createElement('p');
        ageElem.textContent = `Вік: ${data.age}`;

        const hobbiesTitle = document.createElement('p');
        hobbiesTitle.textContent = 'Хобі:';

        const hobbiesList = document.createElement('ul');
        data.hobbies.forEach(hobby => {
          const item = document.createElement('li');
          item.textContent = hobby;
          hobbiesList.appendChild(item);
        });

        profile.appendChild(nameElem);
        profile.appendChild(ageElem);
        profile.appendChild(hobbiesTitle);
        profile.appendChild(hobbiesList);
      })
      .catch(error => {
        console.error('Помилка завантаження JSON:', error);
      });
  </script>
</body>
</html>
